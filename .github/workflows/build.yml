name: Build Kirin 980 Kernel (Force Path)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --user root
    steps:
      - name: Install Core Tools
        run: |
          apt-get update
          apt-get install -y git curl ca-certificates

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: maimaiguanfan/android_kernel_huawei_kirin980
          ref: master

      - name: Install Build Dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            bc \
            bison \
            build-essential \
            ccache \
            device-tree-compiler \
            flex \
            gnupg \
            gperf \
            liblz4-tool \
            libncurses5 \
            libncurses5-dev \
            libssl-dev \
            libxml2 \
            libxml2-utils \
            lzop \
            rsync \
            schedtool \
            squashfs-tools \
            xsltproc \
            python3 \
            python3-dev

      - name: Verify DTC Installation
        run: |
          which dtc
          dtc --version

      - name: Force Toolchain Path
        run: |
          # The kernel is hardcoded to look for toolchain/bin/aarch64-linux-android-gcc
          # We will trick it by creating that folder and symlinking the system compiler
          mkdir -p toolchain/bin
          ln -s /usr/bin/aarch64-linux-gnu-gcc toolchain/bin/aarch64-linux-android-gcc
          ln -s /usr/bin/aarch64-linux-gnu-ld toolchain/bin/aarch64-linux-android-ld
          ln -s /usr/bin/aarch64-linux-gnu-objcopy toolchain/bin/aarch64-linux-android-objcopy
          ln -s /usr/bin/aarch64-linux-gnu-objdump toolchain/bin/aarch64-linux-android-objdump
          ln -s /usr/bin/aarch64-linux-gnu-nm toolchain/bin/aarch64-linux-android-nm
          ln -s /usr/bin/aarch64-linux-gnu-strip toolchain/bin/aarch64-linux-android-strip

      - name: Integrate SukiSU-Ultra
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main

      - name: Configure and Build Kernel
        run: |
          export ARCH=arm64
          export DTC=/usr/bin/dtc
          # Point to our "fake" toolchain folder
          export CROSS_COMPILE=$(pwd)/toolchain/bin/aarch64-linux-android-
          
          # Clean and Load Defconfig
          make clean && make mrproper
          make Pangu_Kirin980_defconfig
          
          # Enable SukiSU/KSU/SUSFS configs
          echo "CONFIG_KALLSYMS_ALL=y" >> .config
          echo "CONFIG_KPROBES=y" >> .config
          echo "CONFIG_KPROBE_EVENTS=y" >> .config
          echo "CONFIG_KPM=y" >> .config
          echo "CONFIG_SUSFS=y" >> .config
          
          # Handle prompts
          yes "" | make oldconfig
          
          # Compile with verbose output for debugging
          make -j$(nproc) V=1

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Kirin980-SukiSU-Kernel
          path: arch/arm64/boot/Image.gz-dtb

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            .config
            build.log
