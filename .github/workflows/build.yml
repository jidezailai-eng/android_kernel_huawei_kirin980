name: Build Kirin 980 Kernel (AOSP Toolchain)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --user root
    steps:
      - name: Install Core Tools
        run: |
          apt-get update
          apt-get install -y git curl ca-certificates

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: maimaiguanfan/android_kernel_huawei_kirin980
          ref: master

      - name: Install Build Dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            bc \
            bison \
            build-essential \
            ccache \
            device-tree-compiler \
            flex \
            gnupg \
            gperf \
            liblz4-tool \
            libncurses5 \
            libncurses5-dev \
            libssl-dev \
            libxml2 \
            libxml2-utils \
            lzop \
            rsync \
            schedtool \
            squashfs-tools \
            xsltproc \
            python3 \
            python3-dev

      - name: Setup Device Tree Compiler Path
        run: |
          # Huawei Makefiles hardcode dtc to /tools/dtc
          mkdir -p /tools
          ln -s /usr/bin/dtc /tools/dtc

      - name: Download AOSP GCC 4.9 Toolchain
        run: |
          # Google removed the binaries from the 'master' branch when they switched to Clang.
          # We must specify an older Android tag to get the actual compiler files.
          git clone --depth=1 -b android-10.0.0_r47 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 toolchain

      - name: Integrate SukiSU-Ultra
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main

      - name: Configure and Build Kernel
        run: |
          export ARCH=arm64
          export DTC=/usr/bin/dtc
          # Point CROSS_COMPILE to our newly downloaded AOSP toolchain
          export CROSS_COMPILE=$(pwd)/toolchain/bin/aarch64-linux-android-
          
          # Clean and Load Defconfig
          make clean && make mrproper
          make Pangu_Kirin980_defconfig
          
          # Enable SukiSU/KSU/SUSFS configs
          echo "CONFIG_KALLSYMS_ALL=y" >> .config
          echo "CONFIG_KPROBES=y" >> .config
          echo "CONFIG_KPROBE_EVENTS=y" >> .config
          echo "CONFIG_KPM=y" >> .config
          echo "CONFIG_SUSFS=y" >> .config
          
          # Handle prompts
          yes "" | make oldconfig
          
          # Compile with verbose output for debugging
          make -j$(nproc) V=1

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Kirin980-SukiSU-Kernel
          path: arch/arm64/boot/Image.gz-dtb

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            .config
            build.log
