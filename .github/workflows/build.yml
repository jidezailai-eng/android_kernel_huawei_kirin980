name: Build Kirin 980 Kernel (Linaro Toolchain)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
      with:
        repository: maimaiguanfan/android_kernel_huawei_kirin980
        ref: master

    - name: Install Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y binutils make python2 libssl-dev flex unzip ca-certificates xz-utils cpio device-tree-compiler git bc bison build-essential ccache curl g++-multilib gcc-multilib gnupg gperf lib32ncurses5-dev lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libxml2 libxml2-utils lzop rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-dev

        # Create the Python 2.7 symlink EXACTLY like the P10 script
        sudo ln -sf /usr/bin/python2.7 /usr/bin/python
        
        # Huawei Makefiles hardcode dtc to /tools/dtc
        sudo mkdir -p /tools
        sudo ln -s /usr/bin/dtc /tools/dtc

    - name: Download Coconutat Linaro Toolchain
      run: |
        # Use the known-good toolchain from the P10 reference!
        git clone https://github.com/Coconutat/ToolChains.git --depth=1 -b linaro_gcc_4.9 toolchain

    - name: Integrate SukiSU-Ultra
      run: |
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main

    - name: Configure and Build Kernel
      run: |
        # Inject the Linaro toolchain into the PATH
        export PATH=$(pwd)/toolchain/bin/:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        # Use the Linaro prefix instead of the Android prefix
        export CROSS_COMPILE=aarch64-linux-gnu-
        
        make clean && make mrproper
        make Pangu_Kirin980_defconfig
        
        # Enable SukiSU/KSU/SUSFS configs
        echo "CONFIG_KALLSYMS_ALL=y" >> .config
        echo "CONFIG_KPROBES=y" >> .config
        echo "CONFIG_KPROBE_EVENTS=y" >> .config
        echo "CONFIG_KPM=y" >> .config
        echo "CONFIG_SUSFS=y" >> .config
        
        yes "" | make oldconfig
        make -j$(nproc --all) V=1

    - name: Upload Kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: Kirin980-SukiSU-Kernel
        path: arch/arm64/boot/Image.gz-dtb

    - name: Upload Build Log on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          .config
          build.log
