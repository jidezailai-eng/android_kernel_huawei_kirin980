name: Build Kirin 980 Kernel (Linaro Toolchain)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: maimaiguanfan/android_kernel_huawei_kirin980
          ref: master

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          
          # Enable 32-bit architecture for older GCC toolchains
          sudo dpkg --add-architecture i386
          sudo apt-get update -y
          
          sudo apt-get install -y binutils make python2 libssl-dev flex unzip ca-certificates xz-utils cpio device-tree-compiler git bc bison build-essential ccache curl g++-multilib gcc-multilib gnupg gperf lib32ncurses5-dev lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libxml2 libxml2-utils lzop rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-dev libc6:i386 libncurses5:i386 libstdc++6:i386
          
          # Create the Python 2.7 symlink EXACTLY like the P10 script
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python
          
          # Move the real DTC so our wrapper can intercept it
          sudo mv /usr/bin/dtc /usr/bin/dtc_real
          
          # Create an impenetrable DTC wrapper script
          sudo bash -c 'cat > /usr/bin/dtc << "EOF"
          #!/bin/bash
          # Rip out ANY -Werror flags passed by Huawei makefiles
          ARGS=$(echo "$@" | sed "s/-Werror//g" | sed "s/-W error//g")
          # Force the compiler to ignore the specific warnings that are failing the build
          /usr/bin/dtc_real -Wno-unit_address_vs_reg -Wno-simple_bus_reg -Wno-alias_paths -Wno-avoid_default_addr_size -Wno-gpios_property -Wno-interrupts_property -Wno-interrupt_provider -Wno-unique_unit_address -Wno-avoid_unnecessary_addr_size $ARGS || true
          EOF'
          
          sudo chmod +x /usr/bin/dtc
          
          # Huawei Makefiles hardcode dtc to /tools/dtc, link it to our wrapper
          sudo mkdir -p /tools
          sudo ln -s /usr/bin/dtc /tools/dtc

      - name: Download Coconutat Linaro Toolchain
        run: |
          # Use the known-good toolchain from the P10 reference!
          git clone https://github.com/Coconutat/ToolChains.git --depth=1 -b linaro_gcc_4.9 toolchain

      - name: Integrate SukiSU-Ultra
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main

      - name: Configure and Build Kernel
        run: |
          # Inject the Linaro toolchain into the PATH
          export PATH=$(pwd)/toolchain/bin/:$PATH
          
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Fixes for GCC 10+ host compiler strictness
          export HOSTCFLAGS="-fcommon -fPIC"
          export HOSTLDFLAGS="-fcommon"
          
          make clean && make mrproper
          make Pangu_Kirin980_defconfig
          
          # ---------------------------------------------------------
          # GCC 10+ COMPILER FIX FOR 'DTC' (yylloc multiple definition)
          # ---------------------------------------------------------
          sed -i 's/YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped || true
          
          # ---------------------------------------------------------
          # HUAWEI DTC INTERNAL COMPILER NEUTER
          # Disable all warning/error flags in the internal DTC checks
          # ---------------------------------------------------------
          sed -i 's/\.warn = true/.warn = false/g' scripts/dtc/checks.c || true
          sed -i 's/\.error = true/.error = false/g' scripts/dtc/checks.c || true
          
          # ---------------------------------------------------------
          # HUAWEI MISSING HEADER & SYNTAX BUG FIXES
          # ---------------------------------------------------------
          # Fix 1: slowpath_count.h
          echo "/* Dummy slowpath_count.h to bypass Huawei source bugs */" > include/slowpath_count.h
          sed -i 's/<slowpath_count.h>/"slowpath_count.h"/g' mm/hisi/slowpath_count.c || true
          
          # Fix 2: cgroup_pids.h syntax error in kernel/fork.c
          sed -i 's/<.\/cgroup_huawei\/cgroup_pids.h>/"cgroup_huawei\/cgroup_pids.h"/g' kernel/fork.c || true
          mkdir -p kernel/cgroup_huawei
          if [ ! -f "kernel/cgroup_huawei/cgroup_pids.h" ]; then
              echo "/* Dummy cgroup_pids.h */" > kernel/cgroup_huawei/cgroup_pids.h
          fi
          
          # Fix 3: dsm_audio.h missing file
          mkdir -p drivers/devkit/audiokit/dsm_audio
          echo "/* Dummy dsm_audio.h */" > drivers/devkit/audiokit/dsm_audio/dsm_audio.h
          sed -i 's/<dsm_audio.h>/"dsm_audio.h"/g' drivers/devkit/audiokit/dsm_audio/dsm_audio.c || true
          
          # Enable SukiSU/KSU/SUSFS configs
          echo "CONFIG_KALLSYMS_ALL=y" >> .config
          echo "CONFIG_KPROBES=y" >> .config
          echo "CONFIG_KPROBE_EVENTS=y" >> .config
          echo "CONFIG_KPM=y" >> .config
          echo "CONFIG_SUSFS=y" >> .config
          
          # Handle prompts
          yes "" | make oldconfig
          
          # Compile with verbose output for debugging
          # Throttle to -j1 to prevent GitHub Actions from running out of RAM
          make -j1 V=1 HOSTCC="gcc -fcommon"

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Kirin980-SukiSU-Kernel
          path: arch/arm64/boot/Image.gz-dtb

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            .config
            build.log
