name: Build Kirin 980 Kernel (xiao-k233 Source)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: xiao-k233/android_kernel_huawei_kirin980_KernelSU
          ref: master # or main, if the checkout fails we'll adjust

      - name: Install Dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -y
          sudo apt-get install -y binutils make python2 libssl-dev flex unzip ca-certificates xz-utils cpio device-tree-compiler git bc bison build-essential ccache curl g++-multilib gcc-multilib gnupg gperf lib32ncurses5-dev lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libxml2 libxml2-utils lzop rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-dev libc6:i386 libncurses5:i386 libstdc++6:i386
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python
          
          # We'll keep our DTC wrapper just to be safe against -Werror traps
          sudo mv /usr/bin/dtc /usr/bin/dtc_real
          sudo bash -c 'cat > /usr/bin/dtc << "EOF"
          #!/bin/bash
          ARGS=$(echo "$@" | sed "s/-Werror//g" | sed "s/-W error//g")
          /usr/bin/dtc_real -Wno-unit_address_vs_reg -Wno-simple_bus_reg -Wno-alias_paths -Wno-avoid_default_addr_size -Wno-gpios_property -Wno-interrupts_property -Wno-interrupt_provider -Wno-unique_unit_address -Wno-avoid_unnecessary_addr_size $ARGS || true
          EOF'
          sudo chmod +x /usr/bin/dtc
          sudo mkdir -p /tools
          sudo ln -s /usr/bin/dtc /tools/dtc

      - name: Download Linaro Toolchain
        run: git clone https://github.com/Coconutat/ToolChains.git --depth=1 -b linaro_gcc_4.9 toolchain

      - name: Inject SukiSU-Ultra
        run: curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main

      - name: Configure and Build Kernel
        run: |
          export PATH=$(pwd)/toolchain/bin/:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export HOSTCFLAGS="-fcommon -fPIC"
          export HOSTLDFLAGS="-fcommon"
          
          make clean && make mrproper
          
          # Assuming they use the same defconfig, if not we'll see it in the log
          make Pangu_Kirin980_defconfig
          
          # GCC 10+ Host Fix
          sed -i 's/YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped || true
          
          # SukiSU Configs
          echo "CONFIG_KALLSYMS_ALL=y" >> .config
          echo "CONFIG_KPROBES=y" >> .config
          echo "CONFIG_KPROBE_EVENTS=y" >> .config
          echo "CONFIG_KPM=y" >> .config
          echo "CONFIG_SUSFS=y" >> .config
          
          yes "" | make oldconfig
          
          sed -i 's/-Werror-implicit-function-declaration//g' Makefile || true
          
          # Full speed ahead using the fixed source!
          make -j$(nproc) HOSTCC="gcc -fcommon" KCFLAGS="-Wno-error -Wno-format -Wno-implicit-function-declaration"

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Kirin980-SukiSU-Kernel
          path: arch/arm64/boot/Image.gz-dtb
