          mkdir -p drivers/devkit/lcdkit/lcdkit3.0/kernel/hisi/include
          echo -e "#ifndef __LCD_KIT_ADAPT_H__\n#define __LCD_KIT_ADAPT_H__\n#include <linux/types.h>\nstruct lcd_kit_dsi_panel_cmds;\nint lcd_kit_dsi_cmds_rx(void* hld, uint8_t* out, struct lcd_kit_dsi_panel_cmds* cmds);\n#endif" > drivers/devkit/lcdkit/lcdkit3.0/kernel/hisi/include/lcd_kit_adapt.h
          cp drivers/devkit/tpkit/3_0/*.h include/ || true
          cp drivers/devkit/tpkit/3_0/*/*.h include/ || true
          cp drivers/hisi/ddrc/*.h include/ || true
          cp drivers/hisi/hi64xx_dsp/*.h include/ || true
          cp drivers/huawei_platform/connectivity/bcm/wifi/include/*.h include/ || true
          cp drivers/huawei_platform/connectivity/bcm/wifi/driver/bcmdhd/*.h include/ || true
          cp drivers/huawei_platform/connectivity/bcm/wifi/driver/bcmdhd/include/*.h include/ || true
          touch include/hi64xx_algo_interface.h
          echo "int hifi_misc_get_platform_type(void) { return 0; } int hifi_misc_probe(void) { return 0; } int hifi_misc_pcm_read(void) { return 0; } int hifi_misc_set_platform_type(void) { return 0; }" > drivers/hisi/hifi_dsp/hifi_lpp.c
          mkdir -p include/linux
          echo "#include <asm/cacheflush.h>" > include/linux/set_memory.h

      - name: Inject and Patch SukiSU-Ultra
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main
          echo "ccflags-y += -std=gnu99 -Wno-declaration-after-statement" >> drivers/kernelsu/Makefile
          sed -i 's/access_ok(/compat_access_ok(/g' drivers/kernelsu/kpm/kpm.c || true
          sed -i '1i #define compat_access_ok(addr, size) access_ok(1, (addr), (size))' drivers/kernelsu/kpm/kpm.c || true
          sed -i '/DEFINE_MEMBER(task_struct, security)/d' drivers/kernelsu/kpm/super_access.c || true
